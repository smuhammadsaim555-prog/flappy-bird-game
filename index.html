<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Two Towers – NexusPlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a, #0a0f1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            position: relative;
            display: inline-block;
        }

        canvas {
            border-radius: 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,170,68,0.5);
            display: block;
            background: #1a2a3a;
        }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .stats {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        .store-btn {
            background: #ffaa44;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }

        .main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(10,15,30,0.95), rgba(5,10,20,0.98));
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border-radius: 25px;
        }

        .game-title {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 250px;
        }

        .menu-btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid #ffaa44;
            padding: 12px;
            border-radius: 50px;
            color: #ffaa44;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #ffaa44;
            color: #1a1a2e;
            transform: scale(1.02);
        }

        /* Store Panel */
        .store-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(10,15,30,0.98), rgba(5,10,20,0.99));
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            z-index: 40;
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
        }

        .store-panel.show {
            display: flex;
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .store-title {
            color: #ffaa44;
            font-size: 20px;
            font-weight: bold;
        }

        .store-close {
            background: none;
            border: none;
            color: #ffaa44;
            font-size: 24px;
            cursor: pointer;
        }

        .category-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffaa44;
            padding: 6px 15px;
            border-radius: 30px;
            color: #ffaa44;
            cursor: pointer;
        }

        .cat-btn.active {
            background: #ffaa44;
            color: #1a1a2e;
        }

        .skins-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skin-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,170,68,0.3);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .skin-item.selected {
            background: #ffaa44;
            border-color: white;
        }

        .skin-item.selected .skin-name {
            color: #1a1a2e;
        }

        .skin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skin-icon {
            font-size: 32px;
        }

        .skin-name {
            color: #ffaa44;
            font-weight: bold;
        }

        .skin-price {
            color: #ffaa44;
        }

        .skin-owned {
            color: #4CAF50;
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            border-radius: 25px;
        }

        .game-over-screen.show {
            display: flex;
        }

        .game-over-title {
            color: #ffaa44;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .final-score {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .restart-btn {
            background: #ffaa44;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .hide {
            display: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="ui-panel">
        <div class="stats">
            <span>❤️ <span id="lives">3</span></span>
            <span>💰 <span id="coins">0</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <button class="store-btn" id="storeBtn">🛒 SHOP</button>
    </div>

    <div id="mainMenu" class="main-menu">
        <div class="game-title">⚔️ TWO TOWERS ⚔️</div>
        <div class="menu-buttons">
            <div class="menu-btn" id="playBtn">PLAY</div>
        </div>
    </div>

    <div id="storePanel" class="store-panel">
        <div class="store-header">
            <div class="store-title">🛒 CHARACTER SHOP</div>
            <button class="store-close" id="closeStoreBtn">✖</button>
        </div>
        <div class="category-buttons" id="categoryButtons"></div>
        <div class="skins-grid" id="skinsGrid"></div>
    </div>

    <div id="gameOverScreen" class="game-over-screen">
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <button class="restart-btn" id="restartBtn">PLAY AGAIN</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game variables
    let lives = 3;
    let coins = localStorage.getItem('twoTowersCoins') ? parseInt(localStorage.getItem('twoTowersCoins')) : 0;
    let score = 0;
    let enemies = [];
    let gameRunning = true;
    let gameActive = false;
    let frame = 0;
    let spawnRate = 60;
    let currentSkin = localStorage.getItem('twoTowersSkin') || 'ninja_shadow';
    let ownedSkins = JSON.parse(localStorage.getItem('twoTowersOwnedSkins')) || ['ninja_shadow'];
    let currentCategory = 'ninja';
    
    // Tower positions
    let leftTower = { x: 80, y: 500, width: 50, height: 80 };
    let rightTower = { x: 270, y: 500, width: 50, height: 80 };
    
    // Enemy types
    const enemyTypes = {
        goblin: { health: 1, damage: 1, speed: 1.5, reward: 10, size: 25, color: '#6B8E23' },
        orc: { health: 2, damage: 1, speed: 1.2, reward: 20, size: 30, color: '#556B2F' },
        troll: { health: 3, damage: 2, speed: 0.8, reward: 30, size: 35, color: '#8B4513' }
    };
    
    // ==================== SKINS WITH COMPLETE COSTUMES ====================
    const categories = {
        ninja: { name: 'NINJA', icon: '🥷' },
        pirate: { name: 'PIRATE', icon: '🏴‍☠️' },
        knight: { name: 'KNIGHT', icon: '🛡️' }
    };
    
    const skins = [
        // NINJA - Complete ninja with sword
        { id: 'ninja_shadow', name: 'Shadow Ninja', category: 'ninja', price: 0, unlocked: true,
          weapon: '🗡️', weaponName: 'Katana', attackAnim: '⚔️', color: '#1a1a1a', eyeColor: '#FF0000',
          hat: '🥷', accessory: '🔪', desc: 'Swift katana strikes' },
        { id: 'ninja_fire', name: 'Fire Ninja', category: 'ninja', price: 800, unlocked: false,
          weapon: '🔥', weaponName: 'Fire Blade', attackAnim: '🔥', color: '#FF4500', eyeColor: '#FFFF00',
          hat: '👺', accessory: '🔪', desc: 'Burning blade attacks' },
        { id: 'ninja_storm', name: 'Storm Ninja', category: 'ninja', price: 1200, unlocked: false,
          weapon: '⚡', weaponName: 'Lightning Blade', attackAnim: '⚡', color: '#00BFFF', eyeColor: '#FFFFFF',
          hat: '🌩️', accessory: '🔪', desc: 'Lightning fast strikes' },
        
        // PIRATE - Complete pirate with hook and eye patch
        { id: 'pirate_deckhand', name: 'Deckhand', category: 'pirate', price: 0, unlocked: true,
          weapon: '🔪', weaponName: 'Cutlass', attackAnim: '⚔️', color: '#8B4513', eyeColor: '#000000',
          hat: '🏴‍☠️', accessory: '🦜', desc: 'Sharp cutlass strikes' },
        { id: 'pirate_captain', name: 'Captain', category: 'pirate', price: 1000, unlocked: false,
          weapon: '⚓', weaponName: 'Anchor', attackAnim: '💥', color: '#2F4F4F', eyeColor: '#FFD700',
          hat: '🧢', accessory: '🦜', desc: 'Heavy anchor swings' },
        { id: 'pirate_kraken', name: 'Kraken Lord', category: 'pirate', price: 1500, unlocked: false,
          weapon: '🐙', weaponName: 'Tentacle', attackAnim: '🌊', color: '#006400', eyeColor: '#FF4500',
          hat: '👑', accessory: '🐙', desc: 'Tentacle slams' },
        
        // KNIGHT - Complete knight with sword and shield
        { id: 'knight_squire', name: 'Squire', category: 'knight', price: 0, unlocked: true,
          weapon: '⚔️', weaponName: 'Longsword', attackAnim: '⚔️', color: '#C0C0C0', eyeColor: '#000000',
          hat: '🛡️', accessory: '🛡️', desc: 'Balanced sword strikes' },
        { id: 'knight_paladin', name: 'Paladin', category: 'knight', price: 1200, unlocked: false,
          weapon: '🔨', weaponName: 'Hammer', attackAnim: '💥', color: '#DAA520', eyeColor: '#FFD700',
          hat: '⛑️', accessory: '🛡️', desc: 'Holy hammer smashes' },
        { id: 'knight_dark', name: 'Dark Knight', category: 'knight', price: 1800, unlocked: false,
          weapon: '🗡️', weaponName: 'Shadow Blade', attackAnim: '🌑', color: '#2F2F2F', eyeColor: '#FF0000',
          hat: '👑', accessory: '🛡️', desc: 'Darkness strikes' }
    ];
    
    function getSkin() { return skins.find(s => s.id === currentSkin); }
    
    function updateUI() {
        document.getElementById('lives').innerText = lives;
        document.getElementById('coins').innerText = coins;
        document.getElementById('score').innerText = score;
        localStorage.setItem('twoTowersCoins', coins);
        localStorage.setItem('twoTowersSkin', currentSkin);
        localStorage.setItem('twoTowersOwnedSkins', JSON.stringify(ownedSkins));
    }
    
    function addEnemy() {
        const types = ['goblin', 'orc', 'troll'];
        const type = types[Math.floor(Math.random() * types.length)];
        const side = Math.random() < 0.5 ? 'left' : 'right';
        const enemy = {
            type: type,
            health: enemyTypes[type].health,
            maxHealth: enemyTypes[type].health,
            x: side === 'left' ? 30 : canvas.width - 55,
            y: 480,
            side: side,
            size: enemyTypes[type].size,
            speed: enemyTypes[type].speed,
            reward: enemyTypes[type].reward
        };
        enemies.push(enemy);
    }
    
    function attackEnemy(side) {
        const skin = getSkin();
        for(let i=0; i<enemies.length; i++) {
            if(enemies[i].side === side) {
                enemies[i].health--;
                // Attack animation effect
                showAttackEffect(side, skin.weapon);
                if(enemies[i].health <= 0) {
                    coins += enemies[i].reward;
                    score += enemies[i].reward;
                    enemies.splice(i,1);
                    updateUI();
                }
                return true;
            }
        }
        // No enemy on that side - damage tower
        lives--;
        updateUI();
        if(lives <= 0) gameOver();
        return false;
    }
    
    function showAttackEffect(side, weaponIcon) {
        // Visual effect will be drawn in next frame
        window.lastAttack = { side: side, weapon: weaponIcon, time: Date.now() };
    }
    
    function gameOver() {
        gameRunning = false;
        gameActive = false;
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOverScreen').classList.add('show');
    }
    
    function restartGame() {
        lives = 3;
        score = 0;
        enemies = [];
        gameRunning = true;
        gameActive = true;
        frame = 0;
        updateUI();
        document.getElementById('gameOverScreen').classList.remove('show');
    }
    
    // ==================== DRAWING ====================
    function drawTowers() {
        const skin = getSkin();
        
        // Left Tower
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(leftTower.x, leftTower.y, leftTower.width, leftTower.height);
        ctx.fillStyle = '#6B3E1A';
        ctx.fillRect(leftTower.x + 5, leftTower.y - 10, 40, 10);
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(leftTower.x + 25, leftTower.y - 5, 8, 0, Math.PI*2);
        ctx.fill();
        
        // Right Tower
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(rightTower.x, rightTower.y, rightTower.width, rightTower.height);
        ctx.fillStyle = '#6B3E1A';
        ctx.fillRect(rightTower.x + 5, rightTower.y - 10, 40, 10);
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(rightTower.x + 25, rightTower.y - 5, 8, 0, Math.PI*2);
        ctx.fill();
        
        // Character on left tower
        ctx.font = '28px monospace';
        ctx.fillStyle = 'white';
        ctx.fillText(skin.hat, leftTower.x + 8, leftTower.y - 15);
        ctx.fillStyle = skin.color;
        ctx.beginPath();
        ctx.arc(leftTower.x + 25, leftTower.y + 15, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = skin.eyeColor;
        ctx.beginPath();
        ctx.arc(leftTower.x + 20, leftTower.y + 12, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(leftTower.x + 30, leftTower.y + 12, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#FF6600';
        ctx.fillText(skin.weapon, leftTower.x + 35, leftTower.y + 18);
        
        // Character on right tower
        ctx.fillText(skin.hat, rightTower.x + 8, rightTower.y - 15);
        ctx.fillStyle = skin.color;
        ctx.beginPath();
        ctx.arc(rightTower.x + 25, rightTower.y + 15, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = skin.eyeColor;
        ctx.beginPath();
        ctx.arc(rightTower.x + 20, rightTower.y + 12, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightTower.x + 30, rightTower.y + 12, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#FF6600';
        ctx.fillText(skin.weapon, rightTower.x + 35, rightTower.y + 18);
    }
    
    function drawEnemies() {
        for(let enemy of enemies) {
            // Enemy body
            ctx.fillStyle = enemyTypes[enemy.type].color;
            ctx.beginPath();
            ctx.ellipse(enemy.x, enemy.y, enemy.size/2, enemy.size/1.5, 0, 0, Math.PI*2);
            ctx.fill();
            // Health bar
            const healthPercent = enemy.health / enemy.maxHealth;
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(enemy.x - 15, enemy.y - 20, 30, 5);
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(enemy.x - 15, enemy.y - 20, 30 * healthPercent, 5);
            // Eyes
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(enemy.x - 5, enemy.y - 5, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(enemy.x + 5, enemy.y - 5, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(enemy.x - 5, enemy.y - 6, 1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(enemy.x + 5, enemy.y - 6, 1.5, 0, Math.PI*2);
            ctx.fill();
            // Angry eyebrows
            ctx.beginPath();
            ctx.moveTo(enemy.x - 10, enemy.y - 12);
            ctx.lineTo(enemy.x - 2, enemy.y - 14);
            ctx.lineTo(enemy.x - 2, enemy.y - 12);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(enemy.x + 10, enemy.y - 12);
            ctx.lineTo(enemy.x + 2, enemy.y - 14);
            ctx.lineTo(enemy.x + 2, enemy.y - 12);
            ctx.fill();
        }
    }
    
    function drawAttackEffect() {
        if(window.lastAttack && Date.now() - window.lastAttack.time < 200) {
            const skin = getSkin();
            const x = window.lastAttack.side === 'left' ? leftTower.x + 40 : rightTower.x - 10;
            const y = leftTower.y + 20;
            ctx.font = '24px monospace';
            ctx.fillStyle = '#FFD700';
            ctx.fillText(window.lastAttack.weapon, x, y);
            ctx.fillStyle = '#FF6600';
            ctx.fillText(skin.attackAnim, x + 15, y - 10);
        }
    }
    
    function drawBackground() {
        const grad = ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0, '#1a2a3a');
        grad.addColorStop(1, '#0a1a2a');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        
        // Ground
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
        ctx.fillStyle = '#4a3a2a';
        for(let i=0; i<10; i++) {
            ctx.fillRect(i*40, canvas.height - 85, 20, 5);
        }
        
        // Path lines
        ctx.strokeStyle = '#ffaa44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, canvas.height - 80);
        ctx.lineTo(canvas.width/2, canvas.height - 50);
        ctx.stroke();
    }
    
    function draw() {
        drawBackground();
        drawTowers();
        drawEnemies();
        drawAttackEffect();
        
        // Instructions
        if(gameActive && gameRunning) {
            ctx.fillStyle = 'white';
            ctx.font = '12px monospace';
            ctx.fillText('Tap LEFT side to attack left enemies', 20, 40);
            ctx.fillText('Tap RIGHT side to attack right enemies', 200, 40);
        }
        
        if(!gameActive && !gameRunning) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#ffaa44';
            ctx.font = 'bold 24px monospace';
            ctx.fillText('GAME OVER', canvas.width/2-85, canvas.height/2-30);
        }
    }
    
    function updateGame() {
        if(!gameActive || !gameRunning) return;
        
        if(frame % spawnRate === 0) {
            addEnemy();
            if(spawnRate > 30) spawnRate--;
        }
        
        for(let i=0; i<enemies.length; i++) {
            const enemy = enemies[i];
            if(enemy.side === 'left') {
                enemy.x += enemy.speed;
                if(enemy.x + enemy.size/2 >= leftTower.x) {
                    lives--;
                    enemies.splice(i,1);
                    updateUI();
                    if(lives <= 0) gameOver();
                    i--;
                }
            } else {
                enemy.x -= enemy.speed;
                if(enemy.x - enemy.size/2 <= rightTower.x + rightTower.width) {
                    lives--;
                    enemies.splice(i,1);
                    updateUI();
                    if(lives <= 0) gameOver();
                    i--;
                }
            }
        }
        
        frame++;
    }
    
    // ==================== SHOP FUNCTIONS ====================
    function renderShop() {
        const categoryButtons = document.getElementById('categoryButtons');
        const skinsGrid = document.getElementById('skinsGrid');
        
        categoryButtons.innerHTML = '';
        for(let [key, cat] of Object.entries(categories)) {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (currentCategory === key ? ' active' : '');
            btn.innerText = cat.name;
            btn.onclick = () => {
                currentCategory = key;
                renderShop();
            };
            categoryButtons.appendChild(btn);
        }
        
        const filtered = skins.filter(s => s.category === currentCategory);
        skinsGrid.innerHTML = '';
        for(let skin of filtered) {
            const owned = ownedSkins.includes(skin.id);
            const selected = currentSkin === skin.id;
            const div = document.createElement('div');
            div.className = 'skin-item' + (selected ? ' selected' : '');
            div.innerHTML = `
                <div class="skin-info">
                    <div class="skin-icon">${skin.weapon}</div>
                    <div>
                        <div class="skin-name">${skin.name}</div>
                        <div style="font-size:10px; color:#aaa;">${skin.desc}</div>
                    </div>
                </div>
                <div>
                    ${!owned ? `<div class="skin-price">${skin.price}💰</div>` : 
                      `<div class="skin-owned">✓ OWNED</div>`}
                </div>
            `;
            div.onclick = () => {
                if(owned) {
                    currentSkin = skin.id;
                    localStorage.setItem('twoTowersSkin', currentSkin);
                    renderShop();
                } else {
                    if(coins >= skin.price) {
                        coins -= skin.price;
                        ownedSkins.push(skin.id);
                        updateUI();
                        renderShop();
                    } else {
                        alert(`Need ${skin.price} coins!`);
                    }
                }
            };
            skinsGrid.appendChild(div);
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    canvas.addEventListener('click', (e) => {
        if(!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scaleX;
        if(mouseX < canvas.width/2) {
            attackEnemy('left');
        } else {
            attackEnemy('right');
        }
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const touchX = (e.touches[0].clientX - rect.left) * scaleX;
        if(touchX < canvas.width/2) {
            attackEnemy('left');
        } else {
            attackEnemy('right');
        }
    });
    
    document.getElementById('playBtn').onclick = () => {
        document.getElementById('mainMenu').classList.add('hide');
        gameActive = true;
        gameRunning = true;
        restartGame();
    };
    
    document.getElementById('restartBtn').onclick = () => {
        restartGame();
    };
    
    document.getElementById('storeBtn').onclick = () => {
        document.getElementById('storePanel').classList.add('show');
        renderShop();
    };
    
    document.getElementById('closeStoreBtn').onclick = () => {
        document.getElementById('storePanel').classList.remove('show');
    };
    
    updateUI();
    
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
</script>
</body>
</html>
