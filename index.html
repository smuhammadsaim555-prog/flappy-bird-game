<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doodle Jump – NexusPlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a, #0a0f1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            position: relative;
            display: inline-block;
        }

        canvas {
            border-radius: 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,170,68,0.5);
            display: block;
        }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .coin-display {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(10,15,30,0.95), rgba(5,10,20,0.98));
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border-radius: 25px;
        }

        .game-title {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 250px;
        }

        .menu-btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid #ffaa44;
            padding: 12px;
            border-radius: 50px;
            color: #ffaa44;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #ffaa44;
            color: #1a1a2e;
            transform: scale(1.02);
        }

        .store-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(10,15,30,0.98), rgba(5,10,20,0.99));
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            z-index: 40;
            border-radius: 25px;
            overflow-y: auto;
        }

        .store-panel.show {
            display: flex;
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,170,68,0.3);
        }

        .store-title {
            color: #ffaa44;
            font-size: 20px;
            font-weight: bold;
        }

        .store-close {
            background: none;
            border: none;
            color: #ffaa44;
            font-size: 24px;
            cursor: pointer;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,170,68,0.2);
        }

        .cat-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #ffaa44;
            padding: 6px 15px;
            border-radius: 30px;
            color: #ffaa44;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-btn.active {
            background: #ffaa44;
            color: #1a1a2e;
        }

        .skins-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
        }

        .skin-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,170,68,0.3);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .skin-item.selected {
            background: #ffaa44;
            border-color: white;
        }

        .skin-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skin-icon {
            font-size: 32px;
        }

        .skin-name {
            color: #ffaa44;
            font-size: 14px;
            font-weight: bold;
        }

        .skin-desc {
            color: #aaa;
            font-size: 10px;
        }

        .skin-price {
            color: #ffaa44;
            font-size: 12px;
            font-weight: bold;
        }

        .skin-owned {
            color: #4CAF50;
            font-size: 12px;
            font-weight: bold;
        }

        .scores-panel, .options-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(10,15,30,0.98), rgba(5,10,20,0.99));
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            z-index: 40;
            border-radius: 25px;
            padding: 20px;
        }

        .scores-panel.show, .options-panel.show {
            display: flex;
        }

        .best-score {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .best-score span {
            color: #ffaa44;
            font-size: 14px;
        }

        .best-score .score-value {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        .option-item {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-label {
            color: white;
            font-weight: bold;
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
        }

        .diff-option {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .diff-option.active {
            background: #ffaa44;
            color: #1a1a2e;
        }

        .music-toggle {
            background: #ffaa44;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-panel {
            background: #ffaa44;
            border: none;
            padding: 10px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .hide {
            display: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="ui-panel">
        <div class="coin-display">💰 <span id="coinCount">0</span></div>
    </div>

    <div id="mainMenu" class="main-menu">
        <div class="game-title">DOODLE JUMP</div>
        <div class="menu-buttons">
            <div class="menu-btn" id="playBtn">PLAY</div>
            <div class="menu-btn" id="storeBtn">STORE</div>
            <div class="menu-btn" id="scoresBtn">SCORES</div>
            <div class="menu-btn" id="optionsBtn">OPTIONS</div>
        </div>
    </div>

    <div id="storePanel" class="store-panel">
        <div class="store-header">
            <div class="store-title">🛒 STORE</div>
            <button class="store-close" id="closeStoreBtn">✖</button>
        </div>
        <div class="category-buttons" id="categoryButtons"></div>
        <div class="skins-grid" id="skinsGrid"></div>
    </div>

    <div id="scoresPanel" class="scores-panel">
        <div class="best-score">
            <span>BEST SCORE</span>
            <div class="score-value" id="bestScoreValue">0</div>
        </div>
        <button class="close-panel" id="closeScoresPanelBtn">CLOSE</button>
    </div>

    <div id="optionsPanel" class="options-panel">
        <div class="option-item">
            <div class="option-label">🎮 DIFFICULTY</div>
            <div class="difficulty-select">
                <button class="diff-option" data-diff="easy">EASY</button>
                <button class="diff-option" data-diff="medium">MEDIUM</button>
                <button class="diff-option" data-diff="hard">HARD</button>
            </div>
        </div>
        <div class="option-item">
            <div class="option-label">🎵 MUSIC</div>
            <button class="music-toggle" id="musicToggleBtn">🔇 OFF</button>
        </div>
        <button class="close-panel" id="closeOptionsPanelBtn">CLOSE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ==================== AUDIO CONTEXT FOR COIN SOUND ====================
    let coinAudioCtx = null;
    function playCoinSound() {
        try {
            if(!coinAudioCtx) {
                coinAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const osc = coinAudioCtx.createOscillator();
            const gain = coinAudioCtx.createGain();
            osc.connect(gain);
            gain.connect(coinAudioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, coinAudioCtx.currentTime + 0.15);
            setTimeout(() => {
                try { osc.stop(); } catch(e) {}
            }, 150);
        } catch(e) {}
    }
    
    // ==================== DIFFICULTY ====================
    let currentDifficulty = localStorage.getItem('doodleDifficulty') || 'medium';
    
    const difficultySettings = {
        easy: { pipeSpeed: 1.5, pipeGap: 170, pipeSpawnRate: 110, coinSpawnChance: 0.55, gravity: 0.22, jumpPower: -5.0 },
        medium: { pipeSpeed: 2.0, pipeGap: 150, pipeSpawnRate: 100, coinSpawnChance: 0.45, gravity: 0.25, jumpPower: -5.5 },
        hard: { pipeSpeed: 2.5, pipeGap: 130, pipeSpawnRate: 90, coinSpawnChance: 0.35, gravity: 0.28, jumpPower: -5.0 }
    };
    
    function getDifficultySettings() { return difficultySettings[currentDifficulty]; }
    function getCoinValue(score) {
        if(score < 20) return 10;
        if(score < 50) return 15;
        if(score < 100) return 20;
        if(score < 200) return 25;
        if(score < 350) return 30;
        if(score < 500) return 35;
        return 40;
    }
    
    // ==================== SKINS WITH COMPLETE COSTUMES ====================
    const categories = {
        ninja: { name: 'NINJA', icon: '🥷' },
        pirate: { name: 'PIRATE', icon: '🏴‍☠️' },
        halloween: { name: 'HALLOWEEN', icon: '🎃' }
    };
    
    const skins = [
        // NINJA - Complete ninja costume
        { id: 'ninja_shadow', name: 'Shadow Ninja', desc: 'Blast some shurikens', category: 'ninja', price: 0, unlocked: true,
          bodyColor: '#1a1a1a', eyeColor: '#FF0000', accessory: '🥷', hat: '⛑️', costume: 'ninja',
          bgGradient: ['#1a2a1a', '#0a1a0a'], effect: 'shuriken', coinIcon: '⭐', pillarStyle: 'bamboo' },
        { id: 'ninja_fire', name: 'Fire Ninja', desc: 'Fire style jutsu', category: 'ninja', price: 1200, unlocked: false,
          bodyColor: '#FF4500', eyeColor: '#FFFF00', accessory: '🔥', hat: '👺', costume: 'ninja',
          bgGradient: ['#2a1a0a', '#1a0a00'], effect: 'fire', coinIcon: '🔥', pillarStyle: 'bamboo' },
        { id: 'ninja_storm', name: 'Storm Ninja', desc: 'Lightning speed', category: 'ninja', price: 1800, unlocked: false,
          bodyColor: '#00BFFF', eyeColor: '#FFFFFF', accessory: '⚡', hat: '🌩️', costume: 'ninja',
          bgGradient: ['#0a1a2a', '#0a2a4a'], effect: 'lightning', coinIcon: '⚡', pillarStyle: 'bamboo' },
        
        // PIRATE - Complete pirate costume
        { id: 'pirate_deckhand', name: 'Deckhand', desc: 'Tattered eye patch', category: 'pirate', price: 0, unlocked: true,
          bodyColor: '#8B4513', eyeColor: '#000000', accessory: '🏴‍☠️', hat: '🧢', costume: 'pirate',
          bgGradient: ['#1a2a4a', '#0a1a3a'], effect: 'pirate', coinIcon: '💰', pillarStyle: 'shipmast' },
        { id: 'pirate_captain', name: 'Captain', desc: 'Tattered eye patch and pistol', category: 'pirate', price: 1100, unlocked: false,
          bodyColor: '#2F4F4F', eyeColor: '#FFD700', accessory: '⚓', hat: '🧢', costume: 'pirate',
          bgGradient: ['#1a3a5a', '#0a2a4a'], effect: 'captain', coinIcon: '⚓', pillarStyle: 'shipmast' },
        { id: 'pirate_first_mate', name: 'First Mate', desc: 'Loyal crew member', category: 'pirate', price: 600, unlocked: false,
          bodyColor: '#A0522D', eyeColor: '#000000', accessory: '🗡️', hat: '🧢', costume: 'pirate',
          bgGradient: ['#2a3a4a', '#1a2a3a'], effect: 'firstmate', coinIcon: '🗡️', pillarStyle: 'shipmast' },
        
        // HALLOWEEN - Complete spooky costume
        { id: 'halloween_pumpkin', name: 'Pumpkin', desc: 'Jack-o-lantern', category: 'halloween', price: 0, unlocked: true,
          bodyColor: '#FF8C00', eyeColor: '#000000', accessory: '🎃', hat: '🎃', costume: 'halloween',
          bgGradient: ['#2a1a1a', '#1a0a0a'], effect: 'pumpkins', coinIcon: '🎃', pillarStyle: 'gravestone' },
        { id: 'halloween_vampire', name: 'Vampire', desc: 'Count Dracula', category: 'halloween', price: 900, unlocked: false,
          bodyColor: '#DC143C', eyeColor: '#FF0000', accessory: '🧛', hat: '🧛', costume: 'halloween',
          bgGradient: ['#1a0000', '#0a0000'], effect: 'bloodmoon', coinIcon: '🦇', pillarStyle: 'gravestone' },
        { id: 'halloween_ghost', name: 'Ghost', desc: 'Spooky spirit', category: 'halloween', price: 700, unlocked: false,
          bodyColor: '#E0E0E0', eyeColor: '#000000', accessory: '👻', hat: '👻', costume: 'halloween',
          bgGradient: ['#4a5d6e', '#2a3a4a'], effect: 'ghosts', coinIcon: '👻', pillarStyle: 'gravestone' }
    ];
    
    // Game variables
    let bird = { x: 80, y: canvas.height/2, radius: 12, velocity: 0 };
    let pipes = [];
    let coins = [];
    let score = 0;
    let totalCoins = localStorage.getItem('doodleCoins') ? parseInt(localStorage.getItem('doodleCoins')) : 0;
    let bestScore = localStorage.getItem('doodleBest') ? parseInt(localStorage.getItem('doodleBest')) : 0;
    let gameRunning = true;
    let frame = 0;
    let gameActive = false;
    let currentSkin = localStorage.getItem('doodleSkin') || 'ninja_shadow';
    let ownedSkins = JSON.parse(localStorage.getItem('doodleOwnedSkins')) || ['ninja_shadow', 'pirate_deckhand', 'halloween_pumpkin'];
    let currentCategory = 'ninja';
    let backgroundOffset = 0;
    let wingAngle = 0;
    
    function getSkin() { return skins.find(s => s.id === currentSkin); }
    
    function updateUI() {
        document.getElementById('coinCount').innerText = totalCoins;
        document.getElementById('bestScoreValue').innerText = bestScore;
    }
    
    function saveGame() {
        localStorage.setItem('doodleBest', bestScore);
        localStorage.setItem('doodleCoins', totalCoins);
        localStorage.setItem('doodleSkin', currentSkin);
        localStorage.setItem('doodleOwnedSkins', JSON.stringify(ownedSkins));
        localStorage.setItem('doodleDifficulty', currentDifficulty);
        updateUI();
    }
    
    function initGame() {
        const settings = getDifficultySettings();
        bird.y = canvas.height/2;
        bird.velocity = 0;
        bird.gravity = settings.gravity;
        bird.jumpPower = settings.jumpPower;
        pipes = [];
        coins = [];
        score = 0;
        gameRunning = true;
        frame = 0;
        updateUI();
    }
    
    function addPipe() {
        const settings = getDifficultySettings();
        const minHeight = 50;
        const maxHeight = canvas.height - settings.pipeGap - minHeight;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            bottomY: topHeight + settings.pipeGap,
            counted: false
        });
        
        if(Math.random() < settings.coinSpawnChance) {
            coins.push({
                x: canvas.width + 20,
                y: topHeight + settings.pipeGap/2,
                collected: false
            });
        }
    }
    
    function updateGame() {
        if(!gameActive || !gameRunning) return;
        
        const settings = getDifficultySettings();
        
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        
        if(bird.y - bird.radius <= 0 || bird.y + bird.radius >= canvas.height) {
            gameOver();
            return;
        }
        
        backgroundOffset = (backgroundOffset + 0.3) % canvas.width;
        
        if(frame % settings.pipeSpawnRate === 0) {
            addPipe();
        }
        
        for(let i=0; i<pipes.length; i++) {
            pipes[i].x -= settings.pipeSpeed;
            
            if(!pipes[i].counted && pipes[i].x + 60 < bird.x) {
                pipes[i].counted = true;
                score++;
                updateUI();
            }
            
            if(bird.x + bird.radius > pipes[i].x && bird.x - bird.radius < pipes[i].x + 60) {
                if(bird.y - bird.radius < pipes[i].topHeight || bird.y + bird.radius > pipes[i].bottomY) {
                    gameOver();
                    return;
                }
            }
            
            if(pipes[i].x + 60 < 0) {
                pipes.splice(i,1);
                i--;
            }
        }
        
        for(let i=0; i<coins.length; i++) {
            coins[i].x -= settings.pipeSpeed;
            if(!coins[i].collected && Math.abs(bird.x - coins[i].x) < 15 && Math.abs(bird.y - coins[i].y) < 15) {
                coins[i].collected = true;
                totalCoins += getCoinValue(score);
                updateUI();
                saveGame();
                // Play coin sound and make coin invisible immediately
                playCoinSound();
                // Remove coin immediately (visible effect)
                coins.splice(i,1);
                i--;
            }
        }
        frame++;
    }
    
    function gameOver() {
        gameRunning = false;
        if(score > bestScore) {
            bestScore = score;
            updateUI();
            saveGame();
        }
        setTimeout(() => {
            if(confirm(`GAME OVER!\nScore: ${score}\nCoins: ${totalCoins}\n\nPlay again?`)) {
                initGame();
            } else {
                gameActive = false;
                document.getElementById('mainMenu').classList.remove('hide');
            }
        }, 50);
    }
    
    function jump() {
        if(!gameActive) return;
        if(!gameRunning) {
            initGame();
            return;
        }
        bird.velocity = bird.jumpPower;
    }
    
    // ==================== DRAWING FUNCTIONS ====================
    function drawBackground() {
        const skin = getSkin();
        const grad = ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0, skin.bgGradient[0]);
        grad.addColorStop(1, skin.bgGradient[1]);
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        
        if(skin.category === 'ninja') {
            ctx.fillStyle = 'rgba(100,150,100,0.3)';
            for(let i=0; i<3; i++) {
                ctx.font = '25px monospace';
                ctx.fillText('🎋', (backgroundOffset + i * 150) % (canvas.width + 100) - 50, 500);
                ctx.fillText('⛩️', (backgroundOffset + i * 200) % (canvas.width + 100) - 50, 100);
            }
        } else if(skin.category === 'pirate') {
            ctx.fillStyle = 'rgba(65,105,225,0.3)';
            for(let i=0; i<2; i++) {
                ctx.font = '25px monospace';
                ctx.fillText('🌊', (backgroundOffset + i * 200) % (canvas.width + 100) - 50, 550);
                ctx.fillText('🏴‍☠️', (backgroundOffset + i * 180) % (canvas.width + 100) - 50, 150);
            }
        } else if(skin.category === 'halloween') {
            ctx.fillStyle = 'rgba(255,100,100,0.2)';
            for(let i=0; i<2; i++) {
                ctx.font = '25px monospace';
                ctx.fillText('🦇', (backgroundOffset + i * 180) % (canvas.width + 100) - 50, 80);
                ctx.fillText('👻', (backgroundOffset + i * 220) % (canvas.width + 100) - 50, 400);
            }
        }
        
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        for(let i=0; i<2; i++) {
            let cloudX = (backgroundOffset + i * 180) % (canvas.width + 200) - 100;
            ctx.beginPath();
            ctx.ellipse(cloudX, 70, 40, 30, 0, 0, Math.PI*2);
            ctx.ellipse(cloudX + 35, 60, 35, 28, 0, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    function drawPillars(pipe) {
        const skin = getSkin();
        
        if(skin.pillarStyle === 'bamboo') {
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(pipe.x, 0, 60, pipe.topHeight);
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, 70, 30);
            for(let i=0; i<pipe.topHeight; i+=40) {
                ctx.fillStyle = '#1B5E20';
                ctx.fillRect(pipe.x + 20, i, 20, 4);
            }
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(pipe.x, pipe.bottomY, 60, canvas.height - pipe.bottomY);
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, 70, 30);
            for(let i=pipe.bottomY; i<canvas.height; i+=40) {
                ctx.fillStyle = '#1B5E20';
                ctx.fillRect(pipe.x + 20, i, 20, 4);
            }
        } else if(skin.pillarStyle === 'shipmast') {
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(pipe.x, 0, 60, pipe.topHeight);
            ctx.fillStyle = '#6B3E1A';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, 70, 30);
            ctx.fillStyle = '#000000';
            ctx.fillRect(pipe.x + 45, pipe.topHeight - 55, 30, 25);
            ctx.fillStyle = 'white';
            ctx.font = '12px monospace';
            ctx.fillText('💀', pipe.x + 52, pipe.topHeight - 38);
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(pipe.x, pipe.bottomY, 60, canvas.height - pipe.bottomY);
            ctx.fillStyle = '#6B3E1A';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, 70, 30);
            ctx.fillStyle = '#000000';
            ctx.fillRect(pipe.x + 45, pipe.bottomY + 25, 30, 25);
            ctx.fillText('💀', pipe.x + 52, pipe.bottomY + 42);
        } else if(skin.pillarStyle === 'gravestone') {
            ctx.fillStyle = '#5A5A6A';
            ctx.fillRect(pipe.x, 0, 60, pipe.topHeight);
            ctx.fillStyle = '#3A3A4A';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, 70, 30);
            ctx.fillStyle = '#8A8A9A';
            ctx.font = '14px monospace';
            ctx.fillText('RIP', pipe.x + 12, pipe.topHeight - 45);
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.arc(pipe.x + 30, pipe.topHeight - 15, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#5A5A6A';
            ctx.fillRect(pipe.x, pipe.bottomY, 60, canvas.height - pipe.bottomY);
            ctx.fillStyle = '#3A3A4A';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, 70, 30);
            ctx.fillStyle = '#8A8A9A';
            ctx.fillText('RIP', pipe.x + 12, pipe.bottomY + 15);
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.arc(pipe.x + 30, pipe.bottomY + 15, 5, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    function drawPipes() {
        for(let pipe of pipes) {
            drawPillars(pipe);
        }
    }
    
    function drawCoins() {
        const skin = getSkin();
        for(let coin of coins) {
            const coinValue = getCoinValue(score);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#B8860B';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.font = '14px monospace';
            ctx.fillText(skin.coinIcon, coin.x-6, coin.y+5);
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 10px monospace';
            ctx.fillText(`+${coinValue}`, coin.x-12, coin.y-8);
        }
    }
    
    function drawBird() {
        const skin = getSkin();
        wingAngle = (wingAngle + 0.2) % (Math.PI * 2);
        const wingOffset = Math.sin(wingAngle) * 5;
        
        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.rotate(Math.min(Math.max(bird.velocity * 0.08, -0.5), 0.7));
        
        // Body
        ctx.beginPath();
        ctx.ellipse(0, 0, bird.radius, bird.radius * 0.9, 0, 0, Math.PI*2);
        ctx.fillStyle = skin.bodyColor;
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Eye
        ctx.fillStyle = skin.eyeColor;
        ctx.beginPath();
        ctx.arc(4, -3, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(5, -4, 1, 0, Math.PI*2);
        ctx.fill();
        
        // Wing (animated)
        ctx.fillStyle = '#FFAA44';
        ctx.beginPath();
        ctx.moveTo(-5, 0);
        ctx.lineTo(-15 + wingOffset, -5);
        ctx.lineTo(-15 + wingOffset, 5);
        ctx.fill();
        
        // Beak
        ctx.fillStyle = '#FF6600';
        ctx.beginPath();
        ctx.moveTo(10, -2);
        ctx.lineTo(18, 0);
        ctx.lineTo(10, 2);
        ctx.fill();
        
        // Costume accessories (hat, etc.)
        ctx.font = '18px monospace';
        ctx.fillStyle = 'white';
        ctx.fillText(skin.hat, -12, -18);
        ctx.font = '14px monospace';
        ctx.fillText(skin.accessory, -5, -8);
        
        ctx.restore();
    }
    
    function drawGround() {
        ctx.fillStyle = '#6B4E3A';
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        ctx.fillStyle = '#8B5A2B';
        for(let i=0; i<20; i++) {
            ctx.fillRect(i*30 + (backgroundOffset % 30), canvas.height-45, 15, 10);
        }
        ctx.fillStyle = '#5D4037';
        ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
    }
    
    function draw() {
        drawBackground();
        drawPipes();
        drawCoins();
        drawBird();
        drawGround();
        
        if(gameActive && gameRunning) {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 28px monospace';
            ctx.fillText(score, canvas.width/2-15, 70);
        }
        
        if(!gameRunning && gameActive) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#ffaa44';
            ctx.font = 'bold 24px monospace';
            ctx.fillText('GAME OVER', canvas.width/2-85, canvas.height/2-30);
            ctx.fillStyle = 'white';
            ctx.font = '16px monospace';
            ctx.fillText(`SCORE: ${score}`, canvas.width/2-50, canvas.height/2+20);
        }
    }
    
    // ==================== UI FUNCTIONS ====================
    function renderStore() {
        const categoryButtons = document.getElementById('categoryButtons');
        const skinsGrid = document.getElementById('skinsGrid');
        
        categoryButtons.innerHTML = '';
        for(let [key, cat] of Object.entries(categories)) {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (currentCategory === key ? ' active' : '');
            btn.innerText = cat.name;
            btn.onclick = () => {
                currentCategory = key;
                renderStore();
            };
            categoryButtons.appendChild(btn);
        }
        
        const filtered = skins.filter(s => s.category === currentCategory);
        skinsGrid.innerHTML = '';
        for(let skin of filtered) {
            const owned = ownedSkins.includes(skin.id);
            const selected = currentSkin === skin.id;
            const div = document.createElement('div');
            div.className = 'skin-item' + (selected ? ' selected' : '');
            div.innerHTML = `
                <div class="skin-left">
                    <div class="skin-icon">${skin.accessory}</div>
                    <div>
                        <div class="skin-name">${skin.name}</div>
                        <div class="skin-desc">${skin.desc}</div>
                    </div>
                </div>
                <div>
                    ${!owned ? `<div class="skin-price">${skin.price}💰</div>` : 
                      `<div class="skin-owned">✓ OWNED</div>`}
                </div>
            `;
            div.onclick = () => {
                if(owned) {
                    currentSkin = skin.id;
                    saveGame();
                    renderStore();
                } else {
                    if(totalCoins >= skin.price) {
                        totalCoins -= skin.price;
                        ownedSkins.push(skin.id);
                        saveGame();
                        renderStore();
                    } else {
                        alert(`Need ${skin.price} coins!`);
                    }
                }
            };
            skinsGrid.appendChild(div);
        }
    }
    
    // ==================== MUSIC ====================
    let audioCtx = null, musicActive = false, masterGain = null;
    let musicInterval = null;
    
    function initMusic() {
        if(audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5;
            masterGain.connect(audioCtx.destination);
            const melody = [262, 294, 330, 349, 392, 440];
            let noteIndex = 0;
            function playNote() {
                if(!musicActive || !audioCtx || audioCtx.state !== 'running') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = melody[noteIndex % melody.length];
                gain.gain.value = 0.08;
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
                noteIndex++;
                setTimeout(playNote, 250);
            }
            musicInterval = setInterval(() => {
                if(musicActive) playNote();
            }, 500);
        } catch(e) {}
    }
    
    function toggleMusic() {
        const btn = document.getElementById('musicToggleBtn');
        if(!audioCtx) initMusic();
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended' || !musicActive) {
            audioCtx.resume().then(() => {
                musicActive = true;
                btn.innerHTML = '🔊 ON';
                btn.style.background = '#4CAF50';
            });
        } else {
            audioCtx.suspend();
            musicActive = false;
            btn.innerHTML = '🔇 OFF';
            btn.style.background = '#ffaa44';
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('playBtn').onclick = () => {
        document.getElementById('mainMenu').classList.add('hide');
        gameActive = true;
        initGame();
    };
    
    document.getElementById('storeBtn').onclick = () => {
        document.getElementById('storePanel').classList.add('show');
        renderStore();
    };
    document.getElementById('closeStoreBtn').onclick = () => {
        document.getElementById('storePanel').classList.remove('show');
    };
    
    document.getElementById('scoresBtn').onclick = () => {
        document.getElementById('scoresPanel').classList.add('show');
        updateUI();
    };
    document.getElementById('closeScoresPanelBtn').onclick = () => {
        document.getElementById('scoresPanel').classList.remove('show');
    };
    
    document.getElementById('optionsBtn').onclick = () => {
        document.getElementById('optionsPanel').classList.add('show');
    };
    document.getElementById('closeOptionsPanelBtn').onclick = () => {
        document.getElementById('optionsPanel').classList.remove('show');
    };
    
    document.querySelectorAll('.diff-option').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.diff-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDifficulty = btn.dataset.diff;
            saveGame();
        };
    });
    document.querySelector(`.diff-option[data-diff="${currentDifficulty}"]`).classList.add('active');
    
    document.getElementById('musicToggleBtn').onclick = toggleMusic;
    document.addEventListener('touchstart', () => { if(!audioCtx) initMusic(); }, { once: true });
    
    canvas.addEventListener('click', jump);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    
    updateUI();
    
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
</script>
</body>
